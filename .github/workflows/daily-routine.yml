name: Daily Routine - Stale Check

on:
  schedule:
    # Run daily at 11:00 AM CET (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allow manual triggering for testing

jobs:
  stale-check:
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: stale-check
      prompt-file: .opencode/commands/stale-check.md
      timeout-minutes: 30
      model: "opencode/big-pickle"
    permissions:
      # Required permissions for the job to access and modify issues/PRs
      issues: write
      pull-requests: write
      contents: read
    secrets: inherit