name: Pull Request Workflow Automation

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-opened:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "pr-opened"
      prompt: "New Pull Request Created - This is a test message for PR workflow automation."
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10