name: Pull Request Workflow Automation

on:
  pull_request:
    types: [opened]
  check_run:
    types: [completed]
  workflow_run:
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  pr-opened:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "pr-opened"
      prompt: |
        New Pull Request Created
        
        Event: pull_request opened
        PR Number: #${{ github.event.pull_request.number }}
        PR Title: "${{ github.event.pull_request.title }}"
        PR Author: ${{ github.event.pull_request.user.login }}
        Repository: ${{ github.repository }}
        
        This is a dummy message for PR workflow automation testing.
        Please acknowledge receipt of this new pull request event.
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10

  check-failed:
    if: github.event_name == 'check_run' && github.event.action == 'completed' && (github.event.check_run.conclusion == 'failure' || github.event.check_run.conclusion == 'cancelled' || github.event.check_run.conclusion == 'timed_out')
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "check-failed"
      prompt: |
        Check Run Failed
        
        Event: check_run completed with failure
        Check Name: ${{ github.event.check_run.name }}
        Check Status: ${{ github.event.check_run.conclusion }}
        Repository: ${{ github.repository }}
        
        This is a dummy message for check failure automation testing.
        Please acknowledge receipt of this check failure event.
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10

  workflow-failed:
    if: github.event_name == 'workflow_run' && github.event.action == 'completed' && (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'cancelled' || github.event.workflow_run.conclusion == 'timed_out')
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "workflow-failed"
      prompt: |
        Workflow Run Failed
        
        Event: workflow_run completed with failure
        Workflow Name: ${{ github.event.workflow_run.name }}
        Workflow Status: ${{ github.event.workflow_run.conclusion }}
        Repository: ${{ github.repository }}
        
        This is a dummy message for workflow failure automation testing.
        Please acknowledge receipt of this workflow failure event.
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10