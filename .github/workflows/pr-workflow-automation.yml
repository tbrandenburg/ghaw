name: Pull Request Workflow Automation

on:
  pull_request:
    types: [opened]
  check_run:
    types: [completed]
  workflow_run:
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  pr-opened:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "pr-opened"
      prompt: |
        New Pull Request Created
        
        Event: pull_request opened
        Repository: ${{ github.repository }}
        Actor: ${{ github.actor }}
        
        This is a dummy message for PR workflow automation testing.
        Please acknowledge receipt of this new pull request event.
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10

  check-completed:
    if: github.event_name == 'check_run'
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "check-completed"
      prompt: |
        Check Run Completed
        
        Event: check_run completed
        Repository: ${{ github.repository }}
        Actor: ${{ github.actor }}
        
        This is a dummy message for check run automation testing.
        Please acknowledge receipt of this check run event.
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10

  workflow-completed:
    if: github.event_name == 'workflow_run'
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "workflow-completed"
      prompt: |
        Workflow Run Completed
        
        Event: workflow_run completed
        Repository: ${{ github.repository }}
        Actor: ${{ github.actor }}
        
        This is a dummy message for workflow run automation testing.
        Please acknowledge receipt of this workflow run event.
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10