name: Pull Request Workflow Automation

on:
  pull_request:
    types: [opened]

jobs:
  pr-opened:
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "pr-opened"
      prompt: "New Pull Request Created - This is a test message."
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10