name: Check Run Failure Automation

on:
  check_run:
    types: [completed]

permissions:
  contents: read

jobs:
  check-failure-detection:
    runs-on: ubuntu-latest
    outputs:
      check_name: ${{ steps.extract-info.outputs.check_name }}
      conclusion: ${{ steps.extract-info.outputs.conclusion }}
      is_failure: ${{ steps.check-failure.outputs.is_failure }}
    steps:
      - name: Check if check run failed
        id: check-failure
        run: |
          # Use toJSON to safely access event data
          EVENT_DATA='${{ toJSON(github.event) }}'
          CONCLUSION=$(echo "$EVENT_DATA" | jq -r '.check_run.conclusion // "unknown"')
          
          echo "Event data available: $(echo "$EVENT_DATA" | jq -r '.check_run.name // "none"')"
          echo "Conclusion: $CONCLUSION"
          
          if [[ "$CONCLUSION" == "failure" || "$CONCLUSION" == "cancelled" || "$CONCLUSION" == "timed_out" ]]; then
            echo "is_failure=true" >> $GITHUB_OUTPUT
            echo "Check run failed with: $CONCLUSION"
          else
            echo "is_failure=false" >> $GITHUB_OUTPUT
            echo "Check run succeeded or event not applicable: $CONCLUSION"
          fi

      - name: Extract check information
        if: steps.check-failure.outputs.is_failure == 'true'
        id: extract-info
        run: |
          EVENT_DATA='${{ toJSON(github.event) }}'
          CHECK_NAME=$(echo "$EVENT_DATA" | jq -r '.check_run.name // "unknown"')
          CONCLUSION=$(echo "$EVENT_DATA" | jq -r '.check_run.conclusion // "unknown"')
          echo "check_name=$CHECK_NAME" >> $GITHUB_OUTPUT
          echo "conclusion=$CONCLUSION" >> $GITHUB_OUTPUT

  notify-check-failure:
    needs: check-failure-detection
    if: needs.check-failure-detection.outputs.is_failure == 'true'
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "check-failure"
      prompt: |
        Check Run Failed
        
        Check Name: ${{ needs.check-failure-detection.outputs.check_name }}
        Status: ${{ needs.check-failure-detection.outputs.conclusion }}
        Repository: ${{ github.repository }}
        
        This is a dummy message for check failure automation testing.
        Please acknowledge receipt of this check failure event.
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10