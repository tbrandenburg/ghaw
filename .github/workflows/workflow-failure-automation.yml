name: Workflow Run Failure Automation

on:
  workflow_run:
    types: [completed]

permissions:
  contents: read

jobs:
  workflow-failure-detection:
    runs-on: ubuntu-latest
    outputs:
      workflow_name: ${{ steps.extract-info.outputs.workflow_name }}
      conclusion: ${{ steps.extract-info.outputs.conclusion }}
      is_failure: ${{ steps.check-failure.outputs.is_failure }}
    steps:
      - name: Check if workflow failed
        id: check-failure
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          if [[ "$CONCLUSION" == "failure" || "$CONCLUSION" == "cancelled" || "$CONCLUSION" == "timed_out" ]]; then
            echo "is_failure=true" >> $GITHUB_OUTPUT
            echo "Workflow failed with: $CONCLUSION"
          else
            echo "is_failure=false" >> $GITHUB_OUTPUT
            echo "Workflow succeeded with: $CONCLUSION"
          fi

      - name: Extract workflow information  
        if: steps.check-failure.outputs.is_failure == 'true'
        id: extract-info
        run: |
          echo "workflow_name=${{ github.event.workflow_run.name }}" >> $GITHUB_OUTPUT
          echo "conclusion=${{ github.event.workflow_run.conclusion }}" >> $GITHUB_OUTPUT

  notify-workflow-failure:
    needs: workflow-failure-detection
    if: needs.workflow-failure-detection.outputs.is_failure == 'true'
    uses: ./.github/workflows/opencode-run.yml
    with:
      run-name: "workflow-failure"
      prompt: |
        Workflow Run Failed
        
        Workflow Name: ${{ needs.workflow-failure-detection.outputs.workflow_name }}
        Status: ${{ needs.workflow-failure-detection.outputs.conclusion }}
        Repository: ${{ github.repository }}
        
        This is a dummy message for workflow failure automation testing.
        Please acknowledge receipt of this workflow failure event.
      model: "opencode/big-pickle"
      agent: "build"
      timeout-minutes: 10